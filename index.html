<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlogApp — Sistemas y Tecnologías Web</title>

  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- ===== BARRA DE NAVEGACIÓN ===== -->
  <header id="site-header">
    <nav id="main-nav">
      <a href="#/" id="nav-logo">BlogApp</a>
      <ul>
        <li><a href="#/" id="nav-home">Inicio</a></li>
        <li><a href="#/favoritos" id="nav-favorites">Favoritos</a></li>
        <li><a href="#/crear" id="nav-create">Nueva Publicación</a></li>
      </ul>
    </nav>
  </header>

  <!-- ===== CONTENEDOR PRINCIPAL DE VISTAS ===== -->
  <main id="app">

    <!-- VISTA: Listado de publicaciones -->
    <section id="view-list" class="view" aria-label="Listado de publicaciones">
      <h1>Publicaciones</h1>
      <div id="list-controls"></div>
      <div id="posts-container"></div>
      <div id="pagination-controls"></div>
    </section>

    <!-- VISTA: Detalle de una publicación -->
    <section id="view-detail" class="view hidden" aria-label="Detalle de publicación">
      <div id="post-detail"></div>
    </section>

    <!-- VISTA: Crear nueva publicación -->
    <section id="view-create" class="view hidden" aria-label="Crear publicación">
      <h1>Nueva Publicación</h1>

      <form id="form-create" novalidate>
        <div class="form-group">
          <label for="create-title">Título</label>
          <input type="text" id="create-title" name="title" placeholder="Título de la publicación" required />
          <span class="field-error" id="error-create-title"></span>
        </div>

        <div class="form-group">
          <label for="create-body">Contenido</label>
          <textarea id="create-body" name="body" rows="6" placeholder="Escribe aquí el contenido..." required></textarea>
          <span class="field-error" id="error-create-body"></span>
        </div>

        <div class="form-group">
          <label for="create-tags">Etiquetas (separadas por coma)</label>
          <input type="text" id="create-tags" name="tags" placeholder="ej: tecnología, noticias" />
        </div>

        <div id="form-create-feedback"></div>

        <div class="form-actions">
          <button type="submit" id="btn-create-submit">Publicar</button>
          <button type="button" id="btn-create-cancel">Cancelar</button>
        </div>
      </form>
    </section>

    <!-- VISTA: Editar publicación existente -->
    <section id="view-edit" class="view hidden" aria-label="Editar publicación">
      <h1>Editar Publicación</h1>

      <form id="form-edit" novalidate>
        <input type="hidden" id="edit-post-id" />

        <div class="form-group">
          <label for="edit-title">Título</label>
          <input type="text" id="edit-title" name="title" required />
          <span class="field-error" id="error-edit-title"></span>
        </div>

        <div class="form-group">
          <label for="edit-body">Contenido</label>
          <textarea id="edit-body" name="body" rows="6" required></textarea>
          <span class="field-error" id="error-edit-body"></span>
        </div>

        <div id="form-edit-feedback"></div>

        <div class="form-actions">
          <button type="submit" id="btn-edit-submit">Guardar cambios</button>
          <button type="button" id="btn-edit-cancel">Cancelar</button>
        </div>
      </form>
    </section>

    <!-- VISTA: Favoritos -->
    <section id="view-favorites" class="view hidden" aria-label="Publicaciones favoritas">
      <h1>Mis Favoritos</h1>

      <!-- Barra de filtros de favoritos — inyectada por ui.renderFavFilters() -->
      <div id="fav-controls"></div>

      <!-- Grilla de posts favoritos — inyectada por ui.renderFavoritesView() -->
      <div id="favorites-container"></div>
    </section>

    <div id="global-feedback" aria-live="polite"></div>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer id="site-footer">
    <p>BlogApp · Sistemas y Tecnologías Web · Diego Guevara &amp; Luis Hernández</p>
  </footer>

  <script type="module" src="js/main.js"></script>

</body>
</html>
